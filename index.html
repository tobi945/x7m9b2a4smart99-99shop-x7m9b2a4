<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f7a4d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Smart Shop">
  <meta name="description" content="רשימת קניות חכמה עם שמירה מקומית ושיתוף לוואטסאפ">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="styles.css">
  <title>Smart Shop</title>
</head>
<body>

  <!-- ── כותרת ─────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-main">
      <div>
        <p class="eyebrow">רשימת קניות אישית</p>
        <h1>Smart Shop</h1>
      </div>
      <div class="header-actions">
        <!-- כפתור מצב סופר -->
        <button class="focus-toggle-btn" id="focusModeBtn" type="button" aria-label="מצב סופר" title="מצב סופר">
          🛒
        </button>
        <!-- כפתור שתף/יבא -->
        <button class="icon-button share-icon-btn" id="openShareModal" type="button" aria-label="שתף ויבא">
          <span aria-hidden="true">⬆</span>
        </button>
        <!-- כפתור הוסף מוצר -->
        <button class="icon-button" id="openProductModal" type="button" aria-label="הוסף מוצר">
          <span aria-hidden="true">+</span>
        </button>
      </div>
    </div>

    <!-- רצועת סיכום (נראית רק כשיש פריטים) -->
    <div class="summary-strip" id="summaryStrip" hidden>
      <span id="summaryTotal">0 מוצרים</span>
      <span id="summaryBought">0 נקנו</span>
      <span id="summaryLeft">0 חסרים</span>
      <span id="summaryBudget" class="budget-cell"></span>
    </div>
  </header>

  <!-- ── תוכן ראשי ──────────────────────────────────── -->
  <main class="app-shell">

    <!-- מצב ריק -->
    <section class="empty-state" id="emptyState">
      <div class="empty-icon" aria-hidden="true">🛒</div>
      <h2>הרשימה ריקה</h2>
      <p>הוסף מוצר ראשון כדי להתחיל לבנות את הקנייה.</p>
      <button class="primary-button" id="emptyAddButton" type="button">הוסף מוצר</button>
    </section>

    <!-- רשימת הקטגוריות -->
    <section class="categories" id="categoriesContainer" aria-live="polite"></section>

  </main>

  <!-- ── כפתור WhatsApp צף ─────────────────────────── -->
  <button class="whatsapp-fab" id="shareWhatsAppButton" type="button"
          aria-label="שתף רשימת קניות בוואטסאפ" hidden>
    <span aria-hidden="true">↗</span>
    <span>שלח לוואטסאפ</span>
  </button>

  <!-- ── מודאל: הוספת מוצר ──────────────────────────── -->
  <div class="modal-overlay" id="productModal" role="presentation" hidden>
    <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-handle" aria-hidden="true"></div>
      <header class="modal-header">
        <h2 id="modalTitle">הוספת מוצר</h2>
        <button class="close-button" id="closeProductModal" type="button" aria-label="סגור">×</button>
      </header>

      <form class="product-form" id="productForm">

        <!-- שם (עם השלמה אוטומטית) -->
        <label class="field">
          <span>שם המוצר</span>
          <input id="productName" name="name" type="text" autocomplete="off"
                 list="nameHistory" placeholder="לדוגמה: חלב, לחם, עגבניות" required>
          <datalist id="nameHistory"></datalist>
        </label>

        <!-- קטגוריה -->
        <label class="field">
          <span>קטגוריה</span>
          <select id="productCategory" name="category" required></select>
        </label>

        <!-- כמות + יחידה (שורה אחת) -->
        <div class="field-row">
          <label class="field">
            <span>כמות</span>
            <input id="productQuantity" name="quantity" type="number"
                   min="1" step="1" value="1" inputmode="numeric" required>
          </label>
          <label class="field">
            <span>יחידה</span>
            <select id="productUnit" name="unit">
              <option value="">--</option>
              <option value='ק"ג'>ק"ג</option>
              <option value="גרם">גרם</option>
              <option value="ליטר">ליטר</option>
              <option value='מ"ל'>מ"ל</option>
              <option value="יח׳">יח׳</option>
              <option value="חבילה">חבילה</option>
            </select>
          </label>
        </div>

        <!-- מחיר + עדיפות (שורה אחת) -->
        <div class="field-row">
          <label class="field">
            <span>מחיר משוער (₪)</span>
            <input id="productPrice" name="price" type="number"
                   min="0" step="0.5" placeholder="אופציונלי" inputmode="decimal">
          </label>
          <div class="field priority-field">
            <span>עדיפות</span>
            <button type="button" id="priorityToggle" class="priority-btn" data-priority="0">
              ☆ רגיל
            </button>
          </div>
        </div>

        <footer class="form-actions">
          <button class="secondary-button" id="cancelProductButton" type="button">ביטול</button>
          <button class="primary-button" type="submit">הוסף לרשימה</button>
        </footer>
      </form>
    </section>
  </div>

  <!-- ── מודאל: שיתוף ויבוא ─────────────────────────────── -->
  <div class="modal-overlay" id="shareModal" role="presentation" hidden>
    <section class="modal-sheet share-modal-sheet" role="dialog" aria-modal="true" aria-labelledby="shareModalTitle">
      <div class="modal-handle" aria-hidden="true"></div>
      <header class="modal-header">
        <h2 id="shareModalTitle">שיתוף ויבוא</h2>
        <button class="close-button" id="closeShareModal" type="button" aria-label="סגור">×</button>
      </header>

      <div class="share-tabs" role="tablist">
        <button class="share-tab active" data-panel="panelExport" role="tab" type="button">📤 שתף קישור</button>
        <button class="share-tab" data-panel="panelImport" role="tab" type="button">📥 יבא מטקסט</button>
      </div>

      <!-- Export panel -->
      <div class="share-panel" id="panelExport">
        <div class="link-box">
          <input class="link-input" id="magicLinkInput" type="text" readonly aria-label="קישור שיתוף">
          <button class="copy-btn" id="copyLinkBtn" type="button">📋 העתק</button>
        </div>
        <div class="share-actions">
          <button class="primary-button" id="shareViaWhatsApp" type="button">↗ שלח בוואטסאפ</button>
          <button class="secondary-button" id="toggleQrBtn" type="button">📷 הצג QR</button>
        </div>
        <div id="qrContainer" class="qr-container" hidden></div>
      </div>

      <!-- Import panel -->
      <div class="share-panel" id="panelImport" hidden>
        <label class="field">
          <span>הדבק טקסט מוואטסאפ</span>
          <textarea id="importTextarea" class="import-textarea"
                    placeholder="לדוגמה:&#10;חלב 2&#10;ביצים&#10;לחם 3, גבינה 1" rows="5"></textarea>
        </label>
        <p class="import-hint">כל שורה או פסיק = מוצר אחד. הוסף מספר אחרי השם לכמות.</p>
        <div id="importPreview" class="import-preview" hidden></div>
        <button class="primary-button import-go-btn" id="importFromTextBtn" type="button">📥 יבא מוצרים</button>

        <div class="or-divider"><span>או</span></div>

        <!-- QR Scanner -->
        <div class="qr-scanner-area">
          <button class="secondary-button scan-qr-btn" id="scanQrBtn" type="button">📷 סרוק קוד QR מהמצלמה</button>
          <div id="qrScanWrapper" class="qr-scan-wrapper" hidden>
            <video id="qrVideo" class="qr-video" playsinline muted></video>
            <canvas id="qrCanvas" hidden></canvas>
            <div class="qr-aim-box" aria-hidden="true"></div>
            <p class="qr-hint-text">כוון את המצלמה לקוד QR</p>
            <button class="stop-scan-btn" id="stopScanBtn" type="button">✕ עצור</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- ── כרזת קישור נכנס ──────────────────────────────────── -->
  <div class="incoming-banner" id="incomingBanner" hidden>
    <div class="incoming-inner">
      <span>📥 <strong>קיבלת רשימת קניות!</strong><span id="incomingCount"></span></span>
      <div class="incoming-actions">
        <button class="primary-button small" id="incomingAcceptBtn" type="button">✅ יבא</button>
        <button class="secondary-button small" id="incomingDenyBtn" type="button">✕ דחה</button>
      </div>
    </div>
  </div>

  <!-- ── Toast: ביטול מחיקה ────────────────────────────── -->
  <div class="undo-toast" id="undoToast" hidden>
    <span id="undoMessage">נמחק</span>
    <button id="undoBtn" type="button">↩ בטל</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
