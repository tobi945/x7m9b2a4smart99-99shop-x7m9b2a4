<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f7a4d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Smart Shop">
  <meta name="description" content="רשימת קניות חכמה עם שמירה מקומית ושיתוף לוואטסאפ">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="styles.css">
  <title>Smart Shop</title>
</head>
<body>
  <header class="app-header">
    <div class="header-main">
      <div>
        <p class="eyebrow">רשימת קניות אישית</p>
        <h1>Smart Shop</h1>
      </div>
      <button class="icon-button" id="openProductModal" type="button" aria-label="הוסף מוצר">
        <span aria-hidden="true">+</span>
      </button>
    </div>

    <div class="summary-strip" id="summaryStrip" hidden>
      <span id="summaryTotal">0 מוצרים</span>
      <span id="summaryBought">0 נקנו</span>
      <span id="summaryLeft">0 חסרים</span>
    </div>
  </header>

  <main class="app-shell">
    <section class="empty-state" id="emptyState">
      <div class="empty-icon" aria-hidden="true">🛒</div>
      <h2>הרשימה ריקה</h2>
      <p>הוסף מוצר ראשון כדי להתחיל לבנות את הקנייה.</p>
      <button class="primary-button" id="emptyAddButton" type="button">הוסף מוצר</button>
    </section>

    <section class="categories" id="categoriesContainer" aria-live="polite"></section>
  </main>

  <button class="whatsapp-fab" id="shareWhatsAppButton" type="button" aria-label="שתף רשימת קניות בוואטסאפ" hidden>
    <span aria-hidden="true">↗</span>
    <span>שלח לוואטסאפ</span>
  </button>

  <div class="modal-overlay" id="productModal" role="presentation" hidden>
    <section class="modal-sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-handle" aria-hidden="true"></div>
      <header class="modal-header">
        <h2 id="modalTitle">הוספת מוצר</h2>
        <button class="close-button" id="closeProductModal" type="button" aria-label="סגור">×</button>
      </header>

      <form class="product-form" id="productForm">
        <label class="field">
          <span>שם המוצר</span>
          <input id="productName" name="name" type="text" autocomplete="off" placeholder="לדוגמה: חלב, לחם, עגבניות" required>
        </label>

        <label class="field">
          <span>קטגוריה</span>
          <select id="productCategory" name="category" required></select>
        </label>

        <label class="field">
          <span>כמות</span>
          <input id="productQuantity" name="quantity" type="number" min="1" step="1" value="1" inputmode="numeric" required>
        </label>

        <footer class="form-actions">
          <button class="secondary-button" id="cancelProductButton" type="button">ביטול</button>
          <button class="primary-button" type="submit">הוסף לרשימה</button>
        </footer>
      </form>
    </section>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
